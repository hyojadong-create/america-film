<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Film application">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f27"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </linearGradient>
    <linearGradient id="glassg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3aa6ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0e2233" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#bgg)"/>
  <!-- glass pane being filmed -->
  <rect x="150" y="120" width="500" height="400" rx="10" fill="url(#glassg)" stroke="#3a4250" stroke-width="3"/>
  <!-- squeegee strokes -->
  <g stroke="#9aa3b2" stroke-width="3" opacity="0.4">
    <line x1="180" y1="180" x2="620" y2="180"/>
    <line x1="180" y1="240" x2="620" y2="240"/>
    <line x1="180" y1="300" x2="620" y2="300"/>
  </g>
  <!-- squeegee tool -->
  <g transform="translate(360,330) rotate(8)">
    <rect x="-130" y="-14" width="260" height="20" rx="6" fill="#c9a14a"/>
    <rect x="-130" y="6" width="260" height="34" rx="4" fill="#1b1f27" stroke="#3a4250" stroke-width="2"/>
  </g>
  <!-- film edge lifting -->
  <path d="M150 120 q-40 30 -20 70" fill="none" stroke="#3aa6ff" stroke-width="4" opacity="0.7"/>
</svg>
