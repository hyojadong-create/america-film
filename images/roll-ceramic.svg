<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240" role="img" aria-label="Ceramic window film roll">
  <defs>
    <linearGradient id="ce" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a52"/>
      <stop offset="55%" stop-color="#16202e"/>
      <stop offset="100%" stop-color="#0c121a"/>
    </linearGradient>
    <linearGradient id="cesheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5aa0e0" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#22384f" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#5aa0e0" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c9a14a"/>
      <stop offset="100%" stop-color="#7a5e23"/>
    </radialGradient>
  </defs>
  <ellipse cx="150" cy="214" rx="120" ry="16" fill="#000" opacity="0.4"/>
  <!-- unrolled film -->
  <path d="M150 70 L150 200 L40 210 L40 95 Z" fill="url(#ce)"/>
  <path d="M150 70 L150 200 L40 210 L40 95 Z" fill="url(#cesheen)" opacity="0.5"/>
  <!-- roll cylinder -->
  <rect x="150" y="40" width="110" height="160" rx="12" fill="url(#ce)"/>
  <ellipse cx="150" cy="120" rx="22" ry="80" fill="#1a2636"/>
  <ellipse cx="260" cy="120" rx="22" ry="80" fill="#243349"/>
  <ellipse cx="260" cy="120" rx="22" ry="80" fill="url(#cesheen)" opacity="0.5"/>
  <!-- core -->
  <ellipse cx="260" cy="120" rx="9" ry="32" fill="url(#core)"/>
</svg>
