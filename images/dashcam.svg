<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240" role="img" aria-label="Dashcam">
  <defs>
    <linearGradient id="dc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b313b"/>
      <stop offset="1" stop-color="#11141a"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#3aa6ff"/>
      <stop offset="55%" stop-color="#13283a"/>
      <stop offset="100%" stop-color="#070b10"/>
    </radialGradient>
  </defs>
  <ellipse cx="150" cy="210" rx="110" ry="15" fill="#000" opacity="0.4"/>
  <!-- body -->
  <rect x="70" y="70" width="160" height="100" rx="16" fill="url(#dc)" stroke="#3a4250" stroke-width="2"/>
  <!-- screen -->
  <rect x="86" y="86" width="74" height="68" rx="6" fill="#0c1016"/>
  <rect x="92" y="92" width="62" height="40" rx="3" fill="#1c2734"/>
  <circle cx="123" cy="112" r="9" fill="#3aa6ff" opacity="0.7"/>
  <!-- lens module -->
  <rect x="170" y="84" width="52" height="72" rx="10" fill="#0c1016" stroke="#3a4250" stroke-width="2"/>
  <circle cx="196" cy="120" r="22" fill="url(#lens)"/>
  <circle cx="196" cy="120" r="9" fill="#0a0e13"/>
  <circle cx="190" cy="114" r="4" fill="#cfe6ff" opacity="0.7"/>
</svg>
